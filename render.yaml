services:
  - type: web
    name: dev-sync-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dev-sync-db
          property: connectionString

databases:
  - name: dev-sync-db
